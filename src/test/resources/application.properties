# === Configuration de TEST ===
# Remplace entièrement application.properties (priorité du classpath de test).
# Base H2 en mémoire (mode PostgreSQL) : les tests tournent sans PostgreSQL local.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate génère le schéma depuis les entités, et le détruit après chaque exécution
spring.jpa.hibernate.ddl-auto=create-drop
# On NE charge PAS data.sql (jeu de démo PostgreSQL) pendant les tests
spring.sql.init.mode=never

# Secret JWT factice (>= 256 bits requis pour HS256)
app.jwt.secret=test-secret-test-secret-test-secret-test-secret-0123456789
app.jwt.access-expiration-minutes=15
app.jwt.refresh-expiration-days=30

app.cors.allowed-origins=http://localhost:4200
