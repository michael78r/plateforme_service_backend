# spring.application.name=restservice

# URL de la base PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/plateforme_services
spring.datasource.username=postgres
spring.datasource.password=michael
spring.datasource.driver-class-name=org.postgresql.Driver

# === Schéma & données de démo (DEV uniquement — utiliser Flyway en prod) ===
# 'create' : Hibernate DROP + recrée tout le schéma depuis les entités à CHAQUE démarrage.
#   -> Idéal pour le 1er lancement / après un changement de modèle.
#   -> Repasse en 'update' pour CONSERVER tes données entre les redémarrages.
spring.jpa.hibernate.ddl-auto=update

# Charge src/main/resources/data.sql APRÈS la création des tables par Hibernate
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# (Optionnel) Afficher les requêtes SQL dans la console
#spring.jpa.show-sql=true
#spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

