# application.properties
app.jwt.secret=b9f4ce1a908dbd24ef11aa3bd777ee641c379a0a3fa2b63134f26ed014c5d932
app.jwt.access-expiration-minutes=15
app.jwt.refresh-expiration-days=30

# === CORS ===
# Origines autorisées (séparées par des virgules). À adapter par environnement (ex. domaine de prod).
app.cors.allowed-origins=http://localhost:4200

# === Email (SMTP) ===
# En dev : MailHog (SMTP local sans auth) -> docker run -p 1025:1025 -p 8025:8025 mailhog/mailhog
# Console MailHog : http://localhost:8025
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
# Permet de couper l'envoi (ex. en local sans SMTP) sans toucher au code
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.from=${MAIL_FROM:no-reply@plateforme-service.local}
